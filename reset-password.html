<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — AERION</title>
    <script src="assets/validator.js" onerror="window.Validator=null;"></script>
    <script src="assets/rate-limiter.js" onerror="window.RateLimiter=function(){this.checkAuthLimit=this.checkPublicLimit=this.checkAuthenticatedLimit=function(){return{allowed:true}};this.recordAuthAttempt=this.recordAuthFailure=this.recordAuthSuccess=function(){};}"></script>
    <script>
        try { window.limiter = new RateLimiter(); } catch(e) { window.limiter = null; console.warn('RateLimiter not loaded:', e); }
    </script>
    <script src="https://cdn.tailwindcss.com/3.4.5"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#fdfdfd',
                        'bg-alt': '#f5f5f7',
                        gold: '#af8c42',
                        'gold-light': '#c6a86c',
                        'gold-dark': '#8a6e32',
                        cream: '#1d1d1f',
                        muted: '#86868b',
                    },
                    fontFamily: {
                        display: ['"Cormorant Garamond"', 'serif'],
                        body: ['"Outfit"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300&family=Outfit:wght@200;300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #fdfdfd;
            --bg-alt: #f5f5f7;
            --gold: #af8c42;
            --gold-light: #c6a86c;
            --gold-dark: #8a6e32;
            --cream: #1d1d1f;
            --muted: #86868b;
            --teal: #4ee8d0;
            --glass: rgba(255, 255, 255, 0.8);
            --border: rgba(0, 0, 0, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000; /* Dark cinematic background */
            color: #fff;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Ambient Glow Background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 50%, rgba(175, 140, 66, .05) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(175, 140, 66, .08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: ambientShift 20s ease-in-out infinite alternate;
        }

        @keyframes ambientShift {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-3%, 2%) scale(1.05); }
            100% { transform: translate(2%, -1%) scale(1); }
        }

        .glass-box {
            background: rgba(12, 12, 20, 0.96);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(175, 140, 66, 0.2);
            box-shadow: 0 20px 80px rgba(0,0,0,0.4);
            border-radius: 24px;
            z-index: 10;
            position: relative;
        }

        /* Gold Button */
        .btn-gold {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light), var(--teal));
            background-size: 300% 300%;
            animation: btnGlow 4s ease infinite;
            color: #0a0a0a;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            letter-spacing: .18em;
            text-transform: uppercase;
            font-size: .72rem;
            padding: 1rem 2.8rem;
            border: none;
            cursor: pointer;
            transition: all .5s cubic-bezier(.23, 1, .32, 1);
        }

        @keyframes btnGlow {
            0%, 100% { background-position: 0% 50% }
            50% { background-position: 100% 50% }
        }

        .btn-gold:hover {
            box-shadow: 0 0 40px rgba(224, 146, 108, .3), 0 0 80px rgba(78, 232, 208, .15);
            transform: translateY(-2px);
        }

        .btn-outline {
            border: 1px solid rgba(224, 146, 108, .3);
            background: transparent;
            color: var(--gold);
            font-family: 'Outfit', sans-serif;
            font-weight: 400;
            letter-spacing: .15em;
            text-transform: uppercase;
            font-size: .7rem;
            padding: .85rem 2rem;
            cursor: pointer;
            transition: all .4s;
        }

        .btn-outline:hover {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(175, 140, 66, .06);
            box-shadow: 0 0 25px rgba(175, 140, 66, .08);
        }

        /* Toast */
        .toast-wrap {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 5000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            padding: 14px 22px;
            border-radius: 8px;
            font-size: .82rem;
            transform: translateX(130%);
            transition: transform .45s cubic-bezier(.23, 1, .32, 1);
            border: 1px solid rgba(255,255,255,.1);
            background: rgba(255,255,255,.06);
            backdrop-filter: blur(10px);
        }

        .toast.show {
            transform: translateX(0);
        }
    </style>
</head>

<body>
    <div class="glass-box max-w-md w-full mx-4 p-10 text-center">
        <h1 class="font-display text-2xl tracking-[.3em] text-gold font-semibold mb-8">AERION</h1>
        
        <h3 class="font-display text-3xl text-white tracking-wider mb-2" id="pageTitle">Reset Password</h3>
        <p class="text-muted text-sm mb-8" id="pageDesc">Enter your new password below.</p>

        <div id="resetForm" class="space-y-6 text-left">
            <div>
                <label class="text-muted text-xs tracking-wider uppercase block mb-2">New Password</label>
                <input type="password" id="newPassword"
                    class="w-full bg-white/[.03] border border-gold/10 rounded-lg px-4 py-3 text-white text-sm outline-none focus:border-gold/30 transition"
                    placeholder="Enter new password">
            </div>
            <button class="btn-gold w-full" onclick="handleResetPassword()" id="resetBtn"><span>Update Password</span></button>
        </div>

        <div id="successState" class="hidden flex flex-col items-center">
            <i class="fa-solid fa-circle-check text-5xl text-gold mb-6"></i>
            <h3 class="font-display text-2xl text-white tracking-wider mb-4">Password Changed</h3>
            <button class="btn-outline w-full" onclick="window.location.href='/'"><span>Return to Login</span></button>
        </div>
        
        <div id="errorState" class="hidden flex flex-col items-center">
            <i class="fa-solid fa-circle-exclamation text-5xl text-red-400 mb-6"></i>
            <h3 class="font-display text-2xl text-white tracking-wider mb-4">Invalid Link</h3>
            <p class="text-muted text-sm mb-8">This password reset link is invalid or has expired.</p>
            <button class="btn-outline w-full" onclick="window.location.href='/'"><span>Return Home</span></button>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-wrap" id="toastWrap"></div>

    <script>
        function showToast(msg, type) {
            const wrap = document.getElementById('toastWrap');
            const t = document.createElement('div');
            const bg = type === 'success' ? 'rgba(200,165,92,.12)' : 'rgba(255,255,255,.06)';
            const border = type === 'success' ? 'rgba(200,165,92,.25)' : 'rgba(255,255,255,.1)';
            t.className = 'toast';
            t.style.background = bg;
            t.style.borderColor = border;
            t.innerHTML = `<span class="text-white/90">${msg}</span>`;
            wrap.appendChild(t);
            requestAnimationFrame(() => t.classList.add('show'));
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 500) }, 3000);
        }

        function getParameterByName(name, url = window.location.href) {
            name = name.replace(/[\[\]]/g, '\\$&');
            var regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)'),
                results = regex.exec(url);
            if (!results) return null;
            if (!results[2]) return '';
            return decodeURIComponent(results[2].replace(/\+/g, ' '));
        }
    </script>

    <!-- FIREBASE INTEGRATION -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
        import { getAuth, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

        // Same config as index.html
        const firebaseConfig = {
            apiKey: "__FIREBASE_API_KEY__",
            authDomain: "__FIREBASE_AUTH_DOMAIN__",
            projectId: "__FIREBASE_PROJECT_ID__",
            storageBucket: "__FIREBASE_STORAGE_BUCKET__",
            messagingSenderId: "__FIREBASE_MESSAGING_SENDER_ID__",
            appId: "__FIREBASE_APP_ID__",
            measurementId: "__FIREBASE_MEASUREMENT_ID__"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const mode = getParameterByName('mode');
        const actionCode = getParameterByName('oobCode');

        // Check if the URL has the correct action code
        if (!actionCode || mode !== 'resetPassword') {
            document.getElementById('resetForm').classList.add('hidden');
            document.getElementById('pageDesc').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');
        }

        window.handleResetPassword = async () => {
            const newPassword = document.getElementById('newPassword').value;
            if (window.Validator) {
                const pv = Validator.validatePassword(newPassword);
                if (!pv.isValid) {
                    showToast(pv.error, 'info');
                    return;
                }
            } else if (!newPassword || newPassword.length < 6) {
                showToast('Password must be at least 6 characters long', 'info');
                return;
            }

            if (window.limiter) {
                const check = window.limiter.checkAuthLimit('confirm_password_reset');
                if (!check.allowed) {
                    showToast(check.reason, 'error');
                    return;
                }
                window.limiter.recordAuthAttempt('confirm_password_reset');
            }

            const btn = document.getElementById('resetBtn');
            btn.innerHTML = '<span>Updating...</span>';
            btn.disabled = true;

            try {
                await confirmPasswordReset(auth, actionCode, newPassword);
                if (window.limiter) window.limiter.recordAuthSuccess('confirm_password_reset');
                
                // Show Success State
                document.getElementById('resetForm').classList.add('hidden');
                document.getElementById('pageTitle').classList.add('hidden');
                document.getElementById('pageDesc').classList.add('hidden');
                document.getElementById('successState').classList.remove('hidden');
                
            } catch (error) {
                if (window.limiter) window.limiter.recordAuthFailure('confirm_password_reset', 'recovery_link');
                showToast(error.message.replace('Firebase: ', ''), 'error');
                btn.innerHTML = '<span>Update Password</span>';
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
